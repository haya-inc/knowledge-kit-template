# ----------------------------------------------------------------------------
# knowledge-kit プロジェクト設定 (.knowledgekit/config.yml)
#
# このファイルは「エージェントや tools/knowledgekit.py の既定挙動を調整したいとき」
# だけ触るものです。未指定の項目は組み込みデフォルトが使われます。
#
# 構造:
#   - ignore は tools/knowledgekit.py が scan/prune で直接参照します
#   - それ以外のセクションは CLAUDE.md §7-§8 に沿ってエージェントが
#     参照するヒントです（強制ではなく、プロジェクトごとの既定値）
#
# 検証: `python tools/knowledgekit.py config` で実効設定を確認できます
# ----------------------------------------------------------------------------

version: 1

# ----------------------------------------------------------------------------
# ignore: inbox / source 走査時にスキップするパターン (fnmatch 形式)
#
# 組み込みデフォルト: .DS_Store, Thumbs.db, *.tmp, *~, .gitkeep
# 以下はユーザー追加パターン。両者はマージされます。
# ----------------------------------------------------------------------------
ignore:
  - "~$*"            # Office が開いている間に作る一時ファイル
  - "*.crdownload"   # Chrome ダウンロード途中
  - ".obsidian/**"   # Obsidian ワークスペース
  - ".trash/**"

# ----------------------------------------------------------------------------
# retry: 失敗エントリ (status: failed) のリトライ方針
#
# tools/knowledgekit.py は自動リトライしません。エージェントが取り込み
# ワークフロー (CLAUDE.md §7) の中で failed_retained を再試行する
# ときの既定挙動をここで指示します。
# ----------------------------------------------------------------------------
retry:
  # 取り込み時に failed_retained を自動で再試行するか
  auto: true
  # 同一 source_hash に対して連続失敗がこの回数を超えたらスキップ
  # (エージェントは state.yml のエントリの notes に失敗回数を残す)
  max_attempts: 3

# ----------------------------------------------------------------------------
# ocr: OCR を使う変換の既定パラメータ
#
# エージェントがどの OCR 実装 (Tesseract / OCRmyPDF / LLM 直読など) を
# 使うかは自由ですが、以下の既定値を優先的に適用します。
# ----------------------------------------------------------------------------
ocr:
  # 認識対象の言語 (ISO 639-2)。複数指定可。
  languages: [jpn, eng]
  # 解像度。スキャン画像が低品質なら上げる。
  dpi: 300
  # ページ範囲: "all" | "1-10" | [1, 3, 5]
  page_range: all
  # これ未満の単語信頼度は [?word] 印を付ける目安
  confidence_mark_below: 0.6

# ----------------------------------------------------------------------------
# web: inbox/**/*.url の取得方針
#
# CLAUDE.md §8 "Web ソース .url の扱い" に対応。
# fetch を先に試し、下記 fallback_on の条件に該当したら browser_mcp に
# 切り替えます。
# ----------------------------------------------------------------------------
web:
  # 試す順序。最初の手段が失敗したら次へ。
  method_order: [fetch, browser_mcp]
  fetch:
    timeout_seconds: 30
    user_agent: "knowledge-kit/0.1"
    follow_redirects: true
  browser_mcp:
    timeout_seconds: 60
  # fetch を「失敗」と見なす条件 (エージェントが判断するヒント)
  fallback_on:
    - http_4xx         # 4xx 応答
    - http_5xx         # 5xx 応答
    - empty_body       # 応答がほぼ空
    - spa_shell        # JS レンダリング必須に見える
    - requires_auth    # 認証が必要
    - network_error    # DNS / タイムアウト

# ----------------------------------------------------------------------------
# language: 出力 Markdown の言語挙動
#
# 原文尊重が原則なので、通常は auto のまま触らないでください。
# ----------------------------------------------------------------------------
language:
  # auto: 原文の言語をそのまま保つ (推奨)
  # ja / en / ...: 強制的にその言語で書く (CLAUDE.md §8 の「翻訳しない」原則より優先)
  default: auto
  # 原文と default が違うときに翻訳するか。既定 false。
  translate: false

# ----------------------------------------------------------------------------
# logs: .knowledgekit/logs/ 配下のログ管理
# ----------------------------------------------------------------------------
logs:
  dir: .knowledgekit/logs
  # 指定日数より古いログを prune 時に削除。0 で無期限保持。
  retention_days: 30

# ----------------------------------------------------------------------------
# readme: README.md の自動更新挙動
# ----------------------------------------------------------------------------
readme:
  # 同期スキル (.claude/skills/sync/SKILL.md) の最後に README.md の source-index ブロックを
  # 自動更新するか。false ならブロックは更新されない (手動実行が必要)。
  auto_update: true
  # 失敗エントリ (status: failed) も README に載せるか。
  include_failed: true

# ----------------------------------------------------------------------------
# dashboard: 1 枚 HTML ダッシュボードの生成挙動
#
# `python tools/knowledgekit.py dashboard` で state.yml と config を元に
# .knowledgekit/dashboard.html を生成します。外部サーバー不要、file:// で開く
# だけで高速起動する静的ページです。
# ----------------------------------------------------------------------------
dashboard:
  # 同期フックで毎回自動生成するか。生成は数十 ms で冪等。
  auto_generate: true
  # 生成後にブラウザを自動で開くか。sync のたびにタブが増えるのを
  # 避けるため、既定は false。`dashboard --open` で都度開く想定。
  auto_open: false
  # 出力先 (root 相対)。.knowledgekit/ 配下なら gitignore で扱いやすい。
  output: .knowledgekit/dashboard.html
